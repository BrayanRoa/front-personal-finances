<p-table [value]="countTransactions" >
    <ng-template pTemplate="header">
        <tr>
            <th>Name</th>
            <th># transactions</th>
        </tr>
    </ng-template>
    <ng-template pTemplate="body" let-transaction>
        <tr>
            <td>{{ transaction.name }}</td>
            <td>{{ transaction.transactionCount }}</td>
        </tr>
    </ng-template>
</p-table>
